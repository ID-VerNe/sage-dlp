name: Build Linux Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name for the release (e.g., 1.0.0)'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Version name for the release (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.13'

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Get version
      id: get_version
      shell: bash
      run: |
        version="${{ inputs.version || github.event.inputs.version }}"
        echo "Extracted version: $version"
        echo "VERSION=$version" >> "$GITHUB_OUTPUT"

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache Python dependencies
      uses: actions/cache@v4
      with:
        path: |
          venv
          ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update -y
        # Tools commonly required by cx_Freeze on Linux packaging
        sudo apt-get install -y --no-install-recommends \
          rpm alien fakeroot patchelf desktop-file-utils file xz-utils zsync

    - name: Create virtual environment and install dependencies
      shell: bash
      run: |
        python -m venv venv
        source venv/bin/activate
        python -m pip install --upgrade pip
        pip install --no-cache-dir .
        pip install --no-cache-dir cx_Freeze

    - name: Prepare build variables
      shell: bash
      run: |
        version="${{ steps.get_version.outputs.VERSION }}"
        echo "VERSION=$version" >> "$GITHUB_ENV"
        arch="$(uname -m)" # x86_64 or aarch64
        echo "ARCH=$arch" >> "$GITHUB_ENV"
        echo "Prepared build variables for version: $version on $(uname -a)"

    - name: Create cx_Freeze setup script (Linux)
      shell: bash
      run: |
        # Create entry point script
        cat > sage_dlp_entry.py <<'ENTRY'
        from sage_dlp.main import main
        if __name__ == "__main__":
            main()
        ENTRY

        cat > setup_cxfreeze.py <<'PY'
        import os
        import sys
        from pathlib import Path
        from cx_Freeze import setup, Executable

        version = os.environ.get("VERSION", "0.0.0")

        # Prepare include_files list
        include_files_list = [
            ("sage_dlp/assets/Icon", "lib/assets/Icon"),
            ("sage_dlp/assets/sound", "lib/assets/sound"),
            ("sage_dlp/languages", "lib/languages"),
            ("branding/icons", "lib/assets/branding/icons"),
            ("sage_dlp.desktop", "share/applications/sage_dlp.desktop"),
            ("branding/icons/icon.png", "share/pixmaps/sage_dlp.png"),
        ]

        build_exe_options = dict(
            optimize=2,
            silent=True,
            packages=[
                "sage_dlp",
                "PySide6.QtCore",
                "PySide6.QtGui",
                "PySide6.QtWidgets",
                "PySide6.QtMultimedia",
                "PySide6.QtNetwork",
                "PySide6.QtDBus",
                "PySide6.QtSvg",
                "requests",
                "PIL",
                "packaging",
                "markdown",
                "loguru",
                "setuptools",
            ],
            zip_include_packages=[
                "PySide6",
                "shiboken6",
                "requests",
                "PIL",
                "packaging",
            ],
            excludes=[
                "PySide6.QtBluetooth",
                "PySide6.QtOpenGL",
                "PySide6.QtPrintSupport",
                "PySide6.QtTest",
                "PySide6.QtXml",
                "PySide6.QtSql",
                "PySide6.QtHelp",
                "PySide6.QtQml",
                "PySide6.QtQuick",
                "PySide6.QtWebEngineCore",
                "PIL.ImageDraw",
                "PIL.ImageFont",
                "numpy",
                "scipy",
                "wx",
                "pandas",
                "tkinter",
                "yt_dlp",
                "unittest",
                "test",
                "tests",
                "pydoc",
                "doctest",
                "email",
            ],
            include_files=include_files_list,
            # Bundle all dependencies - avoid system library references
            bin_includes=[],
            bin_excludes=[],
            # Important: include system libs to avoid external dependencies
            replace_paths=[("*", "")],
        )

        executables = [
            Executable(
                script="sage_dlp_entry.py",
                target_name="sage_dlp",
                icon="branding/icons/icon.png",
            )
        ]

        setup(
            name="sage_dlp",
            version=version,
            description="SageDLP",
            options={
                "build_exe": build_exe_options,
                # AppImage packaging
                "bdist_appimage": {
                    # If ends with .AppImage, use verbatim file name
                    "target_name": f"sage_dlp-v{version}.AppImage",
                },
            },
            executables=executables,
        )
        PY

    - name: Create desktop entry
      shell: bash
      run: |
        cat > sage_dlp.desktop <<'DESKTOP'
        [Desktop Entry]
        Type=Application
        Name=SageDLP
        Comment=YouTube downloader
        Exec=/usr/bin/sage_dlp %U
        Icon=sage_dlp
        Terminal=false
        Categories=AudioVideo;Network;Utility;
        StartupWMClass=SageDLP
        DESKTOP

    - name: Build AppImage and RPM
      shell: bash
      run: |
        set -e
        source venv/bin/activate

        # Ensure a clean build and build_exe first with -OO
        python -OO setup_cxfreeze.py build_exe

        # Clean unnecessary files from build directory before packaging
        build_dir=$(ls -d build/exe.* 2>/dev/null | head -n1 || true)
        
        if [ -n "$build_dir" ]; then
          echo "Trimming files in $build_dir..."
          lib_dir="$build_dir/lib"
          
          if [ -d "$lib_dir" ]; then
            # 1. Remove screenshots
            if [ -d "$lib_dir/assets/branding/screenshots" ]; then
               rm -rf "$lib_dir/assets/branding/screenshots"
               echo "Removed screenshots folder"
            fi

            # 2. Remove unused Qt translations
            if [ -d "$lib_dir/PySide6/translations" ]; then
               rm -rf "$lib_dir/PySide6/translations"
               echo "Removed Qt translations"
            fi

            # 3. Remove unused Qt plugins
            plugins_dir="$lib_dir/PySide6/plugins"
            if [ -d "$plugins_dir" ]; then
                for plugin in designer pdf sql help qml quick webengine bluetooth opengl printsupport test xml; do
                  if [ -d "$plugins_dir/$plugin" ]; then
                    rm -rf "$plugins_dir/$plugin"
                    echo "Removed plugin: $plugin"
                  fi
                done
                # Specific cleanups (imageformats)
                rm -f "$plugins_dir/imageformats/libqpdf.so"
            fi

            # 4. Remove bloat shared libraries (Recursively finds in lib/ and lib/PySide6/)
            # Matches libQt6Qml.so.6, Qt6Qml.abi3.so, etc.
            echo "Removing bloat Qt libraries..."
            find "$lib_dir" -name "*Qt6Web*" -delete
            find "$lib_dir" -name "*Qt6Pdf*" -delete
            find "$lib_dir" -name "*Qt6Qml*" -delete
            find "$lib_dir" -name "*Qt6Quick*" -delete
            find "$lib_dir" -name "*Qt6VirtualKeyboard*" -delete
            find "$lib_dir" -name "*Qt6OpenGL*" -delete 

            # 5. Remove build tools and unused python modules
            for tool in setuptools wheel pkg_resources _distutils_hack curses _pyrepl; do
               rm -rf "$lib_dir/$tool"
               echo "Removed build tool/module: $tool"
            done
          else
             echo "Warning: lib directory not found inside build_dir"
          fi
        else
          echo "Warning: Build directory not found, cannot trim files"
        fi

        # Build AppImage manually to avoid cx_Freeze rebuilding (and untrimming) the artifacts
        echo "Creating AppImage manually..."
        mkdir -p dist
        
        # Download appimagetool
        wget -q -O appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool

        # Setup AppDir structure (Root layout matches cx_Freeze build output exactly)
        rm -rf AppDir
        mkdir -p AppDir
        
        # Copy trimmed build content DIRECTLY to AppDir root
        # This keeps 'lib' adjacent to 'sage_dlp', preventing 'ModuleNotFoundError: encodings'
        cp -r "$build_dir"/* AppDir/
        
        # Setup metadata
        cp sage_dlp.desktop AppDir/
        # Fix Exec path for AppImage context (binary is in root, not /usr/bin)
        sed -i 's|Exec=/usr/bin/sage_dlp|Exec=sage_dlp|g' AppDir/sage_dlp.desktop
        cp branding/icons/icon.png AppDir/sage_dlp.png
        # .DirIcon for file managers
        cp branding/icons/icon.png AppDir/.DirIcon 
        
        # Create AppRun as a script to correctly set environment
        cat > AppDir/AppRun <<'APPRUN'
        #!/bin/sh
        SELF=$(readlink -f "$0")
        HERE=$(dirname "$SELF")
        export LD_LIBRARY_PATH="$HERE/lib:$LD_LIBRARY_PATH"
        exec "$HERE/sage_dlp" "$@"
        APPRUN
        chmod +x AppDir/AppRun
        
        # Build AppImage (using --appimage-extract-and-run to avoid FUSE issues in CI)
        # We explicitly set ARCH for appimagetool
        ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir "dist/sage_dlp-v${version}.AppImage"

        # Build RPM manually with proper spec file
        version="${{ steps.get_version.outputs.VERSION }}"
        arch_uname="${ARCH}"
        workspace_root="$(pwd)"
        build_dir_abs="${workspace_root}/${build_dir}"
        
        # Create custom RPM spec file that doesn't auto-detect dependencies
        mkdir -p build/rpm/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
        
        cat > build/rpm/SPECS/sage_dlp.spec <<SPEC
        %global __requires_exclude_from ^/opt/sage_dlp/.*$
        %global __provides_exclude_from ^/opt/sage_dlp/.*$
        %define _build_id_links none
        %undefine _missing_build_ids_terminate_build
        
        Name:           sage_dlp
        Version:        ${version//-/.}
        Release:        1%{?dist}
        Summary:        SageDLP - A modern YouTube downloader
        License:        MIT
        URL:            https://github.com/oop7/SageDLP
        AutoReqProv:    no
        
        %description
        SageDLP is a modern YouTube downloader with a PySide6 interface.
        Download videos, extract audio, fetch subtitles, and more.
        All dependencies are bundled within the package.
        
        %install
        rm -rf %{buildroot}
        mkdir -p %{buildroot}/opt/sage_dlp
        mkdir -p %{buildroot}/usr/bin
        mkdir -p %{buildroot}/usr/share/applications
        mkdir -p %{buildroot}/usr/share/pixmaps
        
        # Copy application files
        cp -a ${build_dir_abs}/* %{buildroot}/opt/sage_dlp/
        
        # Create wrapper script
        cat > %{buildroot}/usr/bin/sage_dlp <<'WRAPPER'
        #!/usr/bin/env bash
        set -euo pipefail
        APPDIR="/opt/sage_dlp"
        cd "\$APPDIR"
        exec "\$APPDIR/sage_dlp" "\$@"
        WRAPPER
        chmod 0755 %{buildroot}/usr/bin/sage_dlp
        
        # Install desktop file and icon
        install -m 0644 ${workspace_root}/sage_dlp.desktop %{buildroot}/usr/share/applications/sage_dlp.desktop
        install -m 0644 ${workspace_root}/branding/icons/icon.png %{buildroot}/usr/share/pixmaps/sage_dlp.png
        
        %files
        /opt/sage_dlp
        /usr/bin/sage_dlp
        /usr/share/applications/sage_dlp.desktop
        /usr/share/pixmaps/sage_dlp.png
        
        %post
        if command -v update-desktop-database >/dev/null 2>&1; then
          update-desktop-database -q /usr/share/applications || true
        fi
        
        %postun
        if command -v update-desktop-database >/dev/null 2>&1; then
          update-desktop-database -q /usr/share/applications || true
        fi
        
        %changelog
        * $(date +'%a %b %d %Y') SageDLP Maintainers <noreply@example.com> - ${version//-/.}-1
        - Release ${version}
        SPEC
        
        # Build the RPM
        rpmbuild -bb build/rpm/SPECS/sage_dlp.spec \
          --define "_topdir $(pwd)/build/rpm" \
          --buildroot "$(pwd)/build/rpm/BUILDROOT"
        
        # Copy RPM to dist
        mkdir -p dist
        find build/rpm/RPMS -name "*.rpm" -exec cp {} dist/ \;

        echo "Post-build directory listing:"
        echo "-- dist --"; ls -lah dist || true
        echo "-- build --"; ls -lah build || true

    - name: Build native DEB package
      shell: bash
      run: |
        set -e
        version="${{ steps.get_version.outputs.VERSION }}"
        arch_uname="${ARCH}"
        # Map uname -m to Debian arch names
        case "$arch_uname" in
          x86_64) deb_arch=amd64 ;;
          aarch64) deb_arch=arm64 ;;
          *) deb_arch="$arch_uname" ;;
        esac

        # Locate build output
        build_dir=$(ls -d build/exe.* 2>/dev/null | head -n1)
        if [ -z "$build_dir" ]; then
          echo "Error: build/exe.* directory not found" >&2
          exit 1
        fi

        # Staging root
        pkgroot=deb_pkg
        rm -rf "$pkgroot"
        mkdir -p "$pkgroot/DEBIAN" \
                 "$pkgroot/usr/bin" \
                 "$pkgroot/usr/share/applications" \
                 "$pkgroot/usr/share/pixmaps" \
                 "$pkgroot/opt/sage_dlp"

        # Install application payload under /opt/sage_dlp
        cp -a "$build_dir"/* "$pkgroot/opt/sage_dlp/"

        # Wrapper to ensure correct working directory
        cat > "$pkgroot/usr/bin/sage_dlp" <<'WRAP'
        #!/usr/bin/env bash
        set -euo pipefail
        APPDIR="/opt/sage_dlp"
        cd "$APPDIR"
        exec "$APPDIR/sage_dlp" "$@"
        WRAP
        chmod 0755 "$pkgroot/usr/bin/sage_dlp"

        # Desktop file and icon
        install -m 0644 sage_dlp.desktop "$pkgroot/usr/share/applications/sage_dlp.desktop"
        install -m 0644 branding/icons/icon.png "$pkgroot/usr/share/pixmaps/sage_dlp.png"

        # Control file
        cat > "$pkgroot/DEBIAN/control" <<CONTROL
        Package: sage_dlp
        Version: ${version}
        Section: utils
        Priority: optional
        Architecture: ${deb_arch}
        Maintainer: SageDLP Maintainers <noreply@example.com>
        Homepage: https://github.com/oop7/SageDLP
        Description: SageDLP - A modern YouTube downloader with a PySide6 interface
         Download videos, extract audio, fetch subtitles, and more.
        CONTROL

        # Post-install script to refresh desktop/menu caches (best-effort)
        cat > "$pkgroot/DEBIAN/postinst" <<'POSTINST'
        #!/bin/sh
        set -e
        if command -v update-desktop-database >/dev/null 2>&1; then
          update-desktop-database -q || true
        fi
        if command -v gtk-update-icon-cache >/dev/null 2>&1; then
          gtk-update-icon-cache -q /usr/share/icons/hicolor || true
        fi
        exit 0
        POSTINST
        chmod 0755 "$pkgroot/DEBIAN/postinst"

        # Triggers so Debian updates caches
        cat > "$pkgroot/DEBIAN/triggers" <<'TRIGGERS'
        interest-noawait /usr/share/applications
        interest-noawait /usr/share/icons/hicolor
        TRIGGERS

        # Build the deb
        deb_out="SageDLP-v${version}-${deb_arch}.deb"
        dpkg-deb --build "$pkgroot" "$deb_out"

        mkdir -p artifacts
        mv "$deb_out" artifacts/
        echo "Built native DEB: artifacts/$deb_out"

    - name: Build Flatpak Bundle
      shell: bash
      run: |
        version="${{ steps.get_version.outputs.VERSION }}"
        
        # Install flatpak-builder
        sudo apt-get install -y flatpak-builder
        flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

        # Define manifest ID
        APP_ID="io.github.oop7.SageDLP"
        
        # Create a specific desktop file for Flatpak
        # - Exec must be 'sage_dlp' (in path), not /usr/bin/sage_dlp
        # - Icon must match the App ID (io.github.oop7.SageDLP)
        cat > flatpak.desktop <<EOF
        [Desktop Entry]
        Type=Application
        Name=SageDLP
        Comment=YouTube downloader
        Exec=sage_dlp 
        Icon=$APP_ID
        Terminal=false
        Categories=AudioVideo;Network;Utility;
        StartupWMClass=SageDLP
        EOF

        # Create manifest manually
        cat > sage_dlp_flatpak.json <<EOF
        {
          "app-id": "$APP_ID",
          "runtime": "org.kde.Platform",
          "runtime-version": "6.10",
          "sdk": "org.kde.Sdk",
          "command": "sage_dlp",
          "finish-args": [
            "--share=ipc",
            "--socket=x11",
            "--socket=wayland",
            "--socket=pulseaudio",
            "--device=dri",
            "--share=network",
            "--filesystem=host",
            "--env=YTDLP_APP_BIN_PATH=/var/data/yt-dlp"
          ],
          "modules": [
            {
              "name": "sage_dlp",
              "buildsystem": "simple",
              "build-commands": [
                "mkdir -p /app/bin /app/share/sage_dlp",
                "cp -r dist/sage_dlp-v${version}-*/* /app/share/sage_dlp/",
                "ln -s /app/share/sage_dlp/sage_dlp /app/bin/sage_dlp",
                "install -D flatpak.desktop /app/share/applications/$APP_ID.desktop",
                "install -D branding/icons/icon.png /app/share/icons/hicolor/128x128/apps/$APP_ID.png"
              ],
              "sources": [
                {
                  "type": "dir",
                  "path": "."
                }
              ]
            }
          ]
        }
        EOF

        # Build the Flatpak
        # Note: In a real environment, building from source is preferred.
        # Here we are "bundling" the already built binaries from the previous step (cx_Freeze) for simplicity in CI.
        # This requires the 'dist/' folder to be populated by the previous 'Create cx_Freeze setup script' + build steps.
        # Wait, the previous steps built into 'build/exe.linux-...' not 'dist/'. Let's find it.
        
        build_dir=$(ls -d build/exe.* 2>/dev/null | head -n1)
        if [ -z "$build_dir" ]; then
          echo "Error: build/exe.* directory not found for Flatpak build" >&2
          exit 1
        fi
        
        # Move build dir to a fixed location for the manifest source to catch
        mkdir -p dist/sage_dlp-v${version}-flatpak
        cp -r "$build_dir"/* "dist/sage_dlp-v${version}-flatpak/"
        
        # Install runtime/sdk
        flatpak install -y --user flathub org.kde.Platform//6.10 org.kde.Sdk//6.10

        # Build
        flatpak-builder --user --install-deps-from=flathub --repo=repo --force-clean build-flatpak sage_dlp_flatpak.json
        
        # Bundle
        flatpak build-bundle repo artifacts/SageDLP-v${version}-x86_64.flatpak $APP_ID
        echo "Built Flatpak: artifacts/SageDLP-v${version}-x86_64.flatpak"

    - name: Package and prepare release artifacts (.AppImage, .rpm, .deb)
      shell: bash
      run: |
        version="${{ steps.get_version.outputs.VERSION }}"
        mkdir -p artifacts

        # Copy AppImage
        appimage_src=$(ls dist/sage_dlp-v*.AppImage 2>/dev/null | head -n1 || true)
        if [ -n "$appimage_src" ]; then
          cp "$appimage_src" "artifacts/SageDLP-v${version}-${ARCH}.AppImage"
          echo "Copied AppImage: $appimage_src -> artifacts/SageDLP-v${version}-${ARCH}.AppImage"
        else
          echo "Warning: No .AppImage found in dist/"
        fi

        # Copy RPM (normalize name)
        rpm_src=$(ls dist/sage_dlp-*.rpm 2>/dev/null | head -n1 || true)
        if [ -n "$rpm_src" ]; then
          cp "$rpm_src" "artifacts/SageDLP-v${version}-${ARCH}.rpm"
          echo "Copied RPM: $rpm_src -> artifacts/SageDLP-v${version}-${ARCH}.rpm"
        else
          echo "Warning: No .rpm found in dist/"
        fi

        # DEB is already staged in artifacts by the native packaging step
        ls -1 artifacts/*.deb 2>/dev/null || echo "Warning: No .deb found in artifacts/"

        # Check for Flatpak
        ls -1 artifacts/*.flatpak 2>/dev/null || echo "Warning: No .flatpak found in artifacts/"

        echo "Final artifacts:"
        ls -lh artifacts || true

    - name: Create/Update draft release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.VERSION }}
        name: SageDLP v${{ steps.get_version.outputs.VERSION }}
        draft: true
        prerelease: false
        append_body: true
        fail_on_unmatched_files: false
        body: |
          # SageDLP v${{ steps.get_version.outputs.VERSION }}

          **Release Date**: ${{ github.event.head_commit.timestamp }}
        files: |
          artifacts/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
